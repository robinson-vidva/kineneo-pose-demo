<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#1a1a1a" />
<title>KineNeo - Model Comparison</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: #1a1a1a; color: #e8e8e8;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    min-height: 100vh; overflow-x: hidden;
  }
  .app {
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh; padding: 12px;
  }
  .top-nav {
    display: flex; gap: 6px; justify-content: center; margin-bottom: 10px;
  }
  .top-nav a {
    text-decoration: none; font-size: 12px; padding: 5px 14px;
    border-radius: 20px; border: 1px solid #3a3a3a;
    color: #ccc; background: #2a2a2a; transition: background 0.15s, color 0.15s;
  }
  .top-nav a:hover { background: #333; }
  .top-nav a.active { background: #00FF88; color: #0a0a0a; border-color: #00FF88; font-weight: 600; }
  h1 { font-size: 18px; font-weight: 500; margin: 4px 0 12px 0; letter-spacing: 0.3px; color: #f0f0f0; }
  .picker { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 8px; }
  .picker label {
    display: flex; align-items: center; gap: 5px; font-size: 13px; cursor: pointer;
    padding: 6px 12px; border-radius: 6px; border: 1px solid #3a3a3a; background: #2a2a2a;
    -webkit-tap-highlight-color: transparent;
  }
  .picker label.checked { background: #0a3a22; color: #00FF88; border-color: #00FF88; }
  .picker input { display: none; }
  .controls { margin-top: 8px; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
  button {
    background: #2a2a2a; color: #f0f0f0; border: 1px solid #3a3a3a; border-radius: 6px;
    padding: 9px 14px; font-size: 13px; cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  button:hover:not(:disabled) { background: #333; }
  button:active:not(:disabled) { background: #3a3a3a; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  button.primary { background: #00FF88; color: #0a0a0a; border-color: #00FF88; font-weight: 600; }
  button.primary:hover:not(:disabled) { background: #1aff97; }
  .status { margin-top: 10px; min-height: 20px; font-size: 13px; text-align: center; max-width: 520px; }
  .status.error { color: #ff6b6b; }
  .grid {
    width: 100%; max-width: 1400px; display: grid; gap: 12px; margin-top: 12px;
    grid-template-columns: 1fr;
  }
  @media (min-width: 900px) {
    .grid.cols-2 { grid-template-columns: 1fr 1fr; }
    .grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
  }
  .card {
    background: #0f0f0f; border: 1px solid #262626; border-radius: 8px;
    overflow: hidden; display: flex; flex-direction: column;
  }
  .card-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 12px; border-bottom: 1px solid #262626;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px;
  }
  .card-header .model-name { font-weight: 600; }
  .card-header .fps-badge { color: #00FF88; }
  .card-body { position: relative; }
  .card-body canvas {
    display: block; width: 100%; height: auto; background: #000; border-radius: 0;
  }
  .card-stats {
    padding: 6px 12px; font-size: 11px; color: #9a9a9a;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    border-top: 1px solid #262626;
  }
  .warn-text { margin-top: 10px; font-size: 11px; color: #888; text-align: center; }
  footer { margin-top: auto; padding-top: 16px; font-size: 11px; color: #888; text-align: center; }
</style>
</head>
<body>
<div class="app">
  <nav class="top-nav">
    <a href="index.html">Single Model</a>
    <a href="compare.html" class="active">Compare Models</a>
  </nav>
  <h1>KineNeo - Model Comparison</h1>

  <div class="picker" id="picker">
    <label id="lbl_pose" class="checked"><input type="checkbox" value="pose" checked /> Pose</label>
    <label id="lbl_holistic" class="checked"><input type="checkbox" value="holistic" checked /> Holistic</label>
    <label id="lbl_movenet"><input type="checkbox" value="movenet" /> MoveNet Multi</label>
  </div>

  <div class="controls">
    <button id="startBtn" class="primary" type="button">Start Camera</button>
    <button id="flipBtn" type="button" disabled>Switch Camera</button>
  </div>

  <div class="status" id="status"></div>

  <div class="grid" id="grid"></div>

  <div class="warn-text">Running multiple models lowers FPS; try 2 models on mobile for smoother comparison.</div>
  <footer>No data is recorded or saved. All processing happens on your device.</footer>
</div>

<video id="video" playsinline autoplay muted style="display:none;"></video>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/pose.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic@0.5.1675471629/holistic.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3.1675466124/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.15.0/dist/tf-core.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter@4.15.0/dist/tf-converter.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.15.0/dist/tf-backend-webgl.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>

<script>
(function() {
  var video = document.getElementById('video');
  var startBtn = document.getElementById('startBtn');
  var flipBtn = document.getElementById('flipBtn');
  var statusEl = document.getElementById('status');
  var gridEl = document.getElementById('grid');

  var currentStream = null;
  var facingMode = 'environment';
  var running = false;
  var rafId = null;

  var MOVENET_CONNECTIONS = [
    [5,7],[7,9],[6,8],[8,10],[5,6],[5,11],[6,12],[11,12],
    [11,13],[13,15],[12,14],[14,16],[0,1],[0,2],[1,3],[2,4]
  ];

  function setStatus(msg, isError) {
    statusEl.textContent = msg || '';
    statusEl.classList.toggle('error', !!isError);
  }

  function drawTextBadge(cx, x, y, text, color) {
    cx.save();
    cx.font = '12px ui-monospace, SFMono-Regular, Menlo, monospace';
    var m = cx.measureText(text);
    cx.fillStyle = 'rgba(0,0,0,0.65)';
    cx.fillRect(x, y, m.width + 8, 18);
    cx.fillStyle = color || '#fff';
    cx.textBaseline = 'middle';
    cx.fillText(text, x + 4, y + 9);
    cx.restore();
  }

  function angleDeg(a, b, c) {
    var v1x = a.x - b.x, v1y = a.y - b.y, v2x = c.x - b.x, v2y = c.y - b.y;
    var dot = v1x * v2x + v1y * v2y;
    var m1 = Math.hypot(v1x, v1y), m2 = Math.hypot(v2x, v2y);
    if (m1 === 0 || m2 === 0) return null;
    var cos = dot / (m1 * m2);
    if (cos > 1) cos = 1; if (cos < -1) cos = -1;
    return (Math.acos(cos) * 180) / Math.PI;
  }

  // ---- model factories ----
  function createPoseModel() {
    var inst = null, resolveFrame = null;
    return {
      key: 'pose', name: 'MediaPipe Pose', color: '#00FF88',
      init: function() {
        if (inst) return Promise.resolve();
        if (!window.Pose) return Promise.reject(new Error('MediaPipe Pose not loaded'));
        inst = new window.Pose({ locateFile: function(f) { return 'https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/' + f; } });
        inst.setOptions({ modelComplexity: 1, smoothLandmarks: true, enableSegmentation: false, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        inst.onResults(function(r) { if (resolveFrame) { var fn = resolveFrame; resolveFrame = null; fn(r); } });
        return inst.initialize();
      },
      run: function(vid, cvs, cx) {
        if (!inst || vid.readyState < 2) return Promise.resolve(null);
        var w = vid.videoWidth, h = vid.videoHeight;
        if (cvs.width !== w || cvs.height !== h) { cvs.width = w; cvs.height = h; }
        return new Promise(function(resolve) {
          resolveFrame = function(results) {
            cx.clearRect(0, 0, w, h);
            cx.drawImage(vid, 0, 0, w, h);
            var lms = results.poseLandmarks;
            if (lms && lms.length) {
              if (window.drawConnectors && window.POSE_CONNECTIONS)
                window.drawConnectors(cx, lms, window.POSE_CONNECTIONS, { color: '#00FF88', lineWidth: 2 });
              if (window.drawLandmarks)
                window.drawLandmarks(cx, lms, { color: '#FFF', fillColor: '#FFF', lineWidth: 1, radius: 3 });
              var vc = 0;
              for (var i = 0; i < lms.length; i++) { if ((lms[i].visibility || 0) >= 0.5) vc++; }
              resolve({ persons: 1, landmarks: vc + '/33' });
            } else {
              resolve({ persons: 0, landmarks: '0/33' });
            }
          };
          inst.send({ image: vid });
        });
      },
      destroy: function() { resolveFrame = null; if (inst) { inst.close(); inst = null; } }
    };
  }

  function createHolisticModel() {
    var inst = null, resolveFrame = null;
    return {
      key: 'holistic', name: 'MediaPipe Holistic', color: '#7FD8FF',
      init: function() {
        if (inst) return Promise.resolve();
        if (!window.Holistic) return Promise.reject(new Error('MediaPipe Holistic not loaded'));
        inst = new window.Holistic({ locateFile: function(f) { return 'https://cdn.jsdelivr.net/npm/@mediapipe/holistic@0.5.1675471629/' + f; } });
        inst.setOptions({ modelComplexity: 1, smoothLandmarks: true, refineFaceLandmarks: false, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        inst.onResults(function(r) { if (resolveFrame) { var fn = resolveFrame; resolveFrame = null; fn(r); } });
        return inst.initialize();
      },
      run: function(vid, cvs, cx) {
        if (!inst || vid.readyState < 2) return Promise.resolve(null);
        var w = vid.videoWidth, h = vid.videoHeight;
        if (cvs.width !== w || cvs.height !== h) { cvs.width = w; cvs.height = h; }
        return new Promise(function(resolve) {
          resolveFrame = function(results) {
            cx.clearRect(0, 0, w, h);
            cx.drawImage(vid, 0, 0, w, h);
            var p = results.poseLandmarks;
            var f = results.faceLandmarks;
            var lh = results.leftHandLandmarks;
            var rh = results.rightHandLandmarks;
            if (p && p.length) {
              if (f && f.length && window.drawConnectors && window.FACEMESH_TESSELATION)
                window.drawConnectors(cx, f, window.FACEMESH_TESSELATION, { color: 'rgba(127,216,255,0.15)', lineWidth: 0.5 });
              if (window.drawConnectors && window.POSE_CONNECTIONS)
                window.drawConnectors(cx, p, window.POSE_CONNECTIONS, { color: '#7FD8FF', lineWidth: 2 });
              if (window.drawLandmarks)
                window.drawLandmarks(cx, p, { color: '#FFF', fillColor: '#FFF', lineWidth: 1, radius: 3 });
              if (lh && lh.length && window.HAND_CONNECTIONS) {
                window.drawConnectors(cx, lh, window.HAND_CONNECTIONS, { color: '#5BC0EB', lineWidth: 1.5 });
                window.drawLandmarks(cx, lh, { color: '#FFF', fillColor: '#FFF', lineWidth: 1, radius: 2 });
              }
              if (rh && rh.length && window.HAND_CONNECTIONS) {
                window.drawConnectors(cx, rh, window.HAND_CONNECTIONS, { color: '#5BC0EB', lineWidth: 1.5 });
                window.drawLandmarks(cx, rh, { color: '#FFF', fillColor: '#FFF', lineWidth: 1, radius: 2 });
              }
              var total = 33 + (lh ? 21 : 0) + (rh ? 21 : 0) + (f ? 468 : 0);
              var vc = 0;
              for (var i = 0; i < p.length; i++) { if ((p[i].visibility || 0) >= 0.5) vc++; }
              vc += (lh ? lh.length : 0) + (rh ? rh.length : 0) + (f ? f.length : 0);
              resolve({ persons: 1, landmarks: vc + '/' + total });
            } else {
              resolve({ persons: 0, landmarks: '0/543' });
            }
          };
          inst.send({ image: vid });
        });
      },
      destroy: function() { resolveFrame = null; if (inst) { inst.close(); inst = null; } }
    };
  }

  function createMoveNetModel() {
    var detector = null;
    return {
      key: 'movenet', name: 'MoveNet MultiPose', color: '#FFB347',
      init: function() {
        if (detector) return Promise.resolve();
        if (!window.poseDetection) return Promise.reject(new Error('pose-detection not loaded'));
        return tf.setBackend('webgl').then(function() { return tf.ready(); }).then(function() {
          return poseDetection.createDetector(
            poseDetection.SupportedModels.MoveNet,
            { modelType: poseDetection.movenet.modelType.MULTIPOSE_LIGHTNING, enableTracking: true, trackerType: poseDetection.TrackerType.BoundingBox }
          );
        }).then(function(d) { detector = d; });
      },
      run: function(vid, cvs, cx) {
        if (!detector || vid.readyState < 2) return Promise.resolve(null);
        var w = vid.videoWidth, h = vid.videoHeight;
        if (cvs.width !== w || cvs.height !== h) { cvs.width = w; cvs.height = h; }
        return detector.estimatePoses(vid, { maxPoses: 6, flipHorizontal: false }).then(function(poses) {
          cx.clearRect(0, 0, w, h);
          cx.drawImage(vid, 0, 0, w, h);
          var pColors = ['#FFB347','#FF6B6B','#7FD8FF','#00FF88','#C084FC','#F472B6'];
          if (!poses || !poses.length) return { persons: 0, landmarks: '0/17' };
          for (var p = 0; p < poses.length; p++) {
            var kps = poses[p].keypoints;
            var col = pColors[p % pColors.length];
            for (var ci = 0; ci < MOVENET_CONNECTIONS.length; ci++) {
              var a = kps[MOVENET_CONNECTIONS[ci][0]], b = kps[MOVENET_CONNECTIONS[ci][1]];
              if (a.score >= 0.3 && b.score >= 0.3) {
                cx.beginPath(); cx.moveTo(a.x, a.y); cx.lineTo(b.x, b.y);
                cx.strokeStyle = col; cx.lineWidth = 2; cx.stroke();
              }
            }
            for (var ki = 0; ki < kps.length; ki++) {
              if (kps[ki].score >= 0.3) {
                cx.beginPath(); cx.arc(kps[ki].x, kps[ki].y, 3, 0, 2 * Math.PI);
                cx.fillStyle = '#FFF'; cx.fill();
              }
            }
            var minX = Infinity, minY = Infinity;
            for (var mi = 0; mi < kps.length; mi++) {
              if (kps[mi].score >= 0.3) { if (kps[mi].x < minX) minX = kps[mi].x; if (kps[mi].y < minY) minY = kps[mi].y; }
            }
            if (minX < Infinity) drawTextBadge(cx, minX, Math.max(0, minY - 20), 'P' + (p+1) + ' ' + (poses[p].score != null ? poses[p].score.toFixed(2) : ''), col);
          }
          var best = poses[0];
          for (var bi = 1; bi < poses.length; bi++) { if ((poses[bi].score||0) > (best.score||0)) best = poses[bi]; }
          var vc = 0;
          for (var si = 0; si < best.keypoints.length; si++) { if (best.keypoints[si].score >= 0.5) vc++; }
          return { persons: poses.length, landmarks: vc + '/17' };
        });
      },
      destroy: function() { if (detector) { detector.dispose(); detector = null; } }
    };
  }

  // ---- state ----
  var activeSlots = [];
  var factories = { pose: createPoseModel, holistic: createHolisticModel, movenet: createMoveNetModel };

  function getSelectedKeys() {
    var keys = [];
    var checks = document.querySelectorAll('#picker input[type=checkbox]');
    for (var i = 0; i < checks.length; i++) { if (checks[i].checked) keys.push(checks[i].value); }
    return keys;
  }

  function updatePickerUI() {
    var keys = getSelectedKeys();
    ['pose','holistic','movenet'].forEach(function(k) {
      var lbl = document.getElementById('lbl_' + k);
      lbl.classList.toggle('checked', keys.indexOf(k) >= 0);
    });
    startBtn.disabled = keys.length < 2;
  }

  document.querySelectorAll('#picker input[type=checkbox]').forEach(function(cb) {
    cb.addEventListener('change', function() {
      var keys = getSelectedKeys();
      if (keys.length < 2) { cb.checked = true; }
      if (keys.length > 3) { cb.checked = false; }
      updatePickerUI();
    });
  });
  updatePickerUI();

  async function startStream() {
    var constraints = { audio: false, video: { facingMode: { ideal: facingMode }, width: { ideal: 1280 }, height: { ideal: 720 } } };
    var stream;
    try {
      stream = await navigator.mediaDevices.getUserMedia(constraints);
    } catch (e) {
      stream = await navigator.mediaDevices.getUserMedia({ audio: false, video: { width: { ideal: 1280 }, height: { ideal: 720 } } });
    }
    currentStream = stream;
    video.srcObject = stream;
    await new Promise(function(resolve) {
      if (video.readyState >= 2) return resolve();
      video.onloadedmetadata = function() { resolve(); };
    });
    try { await video.play(); } catch(e) {}
  }

  function stopStream() {
    if (currentStream) {
      currentStream.getTracks().forEach(function(t) { try { t.stop(); } catch(e) {} });
      currentStream = null;
    }
    if (video.srcObject) video.srcObject = null;
  }

  function buildGrid(keys) {
    gridEl.innerHTML = '';
    gridEl.className = 'grid cols-' + keys.length;
    var slots = [];
    for (var i = 0; i < keys.length; i++) {
      var model = factories[keys[i]]();
      var card = document.createElement('div');
      card.className = 'card';
      var header = document.createElement('div');
      header.className = 'card-header';
      var nameSpan = document.createElement('span');
      nameSpan.className = 'model-name';
      nameSpan.textContent = model.name;
      nameSpan.style.color = model.color;
      var fpsSpan = document.createElement('span');
      fpsSpan.className = 'fps-badge';
      fpsSpan.textContent = '0 FPS';
      header.appendChild(nameSpan);
      header.appendChild(fpsSpan);
      var body = document.createElement('div');
      body.className = 'card-body';
      var cvs = document.createElement('canvas');
      body.appendChild(cvs);
      var stats = document.createElement('div');
      stats.className = 'card-stats';
      stats.textContent = 'persons: - | landmarks: -';
      card.appendChild(header);
      card.appendChild(body);
      card.appendChild(stats);
      gridEl.appendChild(card);
      slots.push({ model: model, canvas: cvs, ctx: cvs.getContext('2d'), fpsEl: fpsSpan, statsEl: stats, frameCount: 0, lastFps: performance.now(), fps: 0 });
    }
    return slots;
  }

  function rafLoop() {
    if (!running) return;
    rafId = requestAnimationFrame(function() {
      if (!running) return;
      var promises = [];
      for (var i = 0; i < activeSlots.length; i++) {
        (function(slot) {
          var t0 = performance.now();
          var p = slot.model.run(video, slot.canvas, slot.ctx).then(function(result) {
            slot.frameCount++;
            var now = performance.now();
            if (now - slot.lastFps >= 500) {
              slot.fps = Math.round((slot.frameCount * 1000) / (now - slot.lastFps));
              slot.fpsEl.textContent = slot.fps + ' FPS';
              slot.frameCount = 0;
              slot.lastFps = now;
            }
            if (result) {
              slot.statsEl.textContent = 'persons: ' + result.persons + ' | landmarks: ' + result.landmarks;
            }
          }).catch(function() {});
          promises.push(p);
        })(activeSlots[i]);
      }
      Promise.all(promises).then(function() { rafLoop(); });
    });
  }

  async function start() {
    if (running) return;
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      setStatus('Camera API is not available in this browser.', true); return;
    }
    var keys = getSelectedKeys();
    if (keys.length < 2) { setStatus('Select at least 2 models.', true); return; }

    startBtn.disabled = true;
    setStatus('Requesting camera access...');
    try {
      await startStream();
    } catch (err) {
      startBtn.disabled = false;
      var name = err && err.name ? err.name : '';
      if (name === 'NotAllowedError' || name === 'PermissionDeniedError') {
        setStatus('Camera permission denied. Allow camera access and try again.', true);
      } else if (name === 'NotFoundError' || name === 'DevicesNotFoundError') {
        setStatus('No camera found on this device.', true);
      } else if (name === 'NotReadableError' || name === 'TrackStartError') {
        setStatus('Camera is in use by another application.', true);
      } else if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
        setStatus('Camera access requires HTTPS.', true);
      } else {
        setStatus('Could not start camera: ' + (err && err.message ? err.message : 'unknown'), true);
      }
      return;
    }

    setStatus('Loading models...');
    activeSlots = buildGrid(keys);

    try {
      var inits = [];
      for (var i = 0; i < activeSlots.length; i++) { inits.push(activeSlots[i].model.init()); }
      await Promise.all(inits);
    } catch (err) {
      setStatus('Failed to load model: ' + (err && err.message ? err.message : 'unknown'), true);
      stopStream();
      startBtn.disabled = false;
      return;
    }

    running = true;
    flipBtn.disabled = false;
    startBtn.textContent = 'Stop';
    startBtn.disabled = false;
    setStatus('');
    document.querySelectorAll('#picker input[type=checkbox]').forEach(function(cb) { cb.disabled = true; });
    rafLoop();
  }

  async function stop() {
    running = false;
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
    for (var i = 0; i < activeSlots.length; i++) { activeSlots[i].model.destroy(); }
    activeSlots = [];
    stopStream();
    gridEl.innerHTML = '';
    flipBtn.disabled = true;
    startBtn.textContent = 'Start Camera';
    startBtn.disabled = false;
    setStatus('');
    document.querySelectorAll('#picker input[type=checkbox]').forEach(function(cb) { cb.disabled = false; });
    updatePickerUI();
  }

  async function flip() {
    if (!running) return;
    flipBtn.disabled = true;
    facingMode = (facingMode === 'environment') ? 'user' : 'environment';
    try {
      running = false;
      if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
      if (currentStream) {
        currentStream.getTracks().forEach(function(t) { try { t.stop(); } catch(e) {} });
        currentStream = null;
      }
      await startStream();
      running = true;
      for (var i = 0; i < activeSlots.length; i++) {
        activeSlots[i].frameCount = 0;
        activeSlots[i].lastFps = performance.now();
      }
      rafLoop();
    } catch (err) {
      setStatus('Could not switch camera: ' + (err && err.message ? err.message : 'unknown'), true);
    } finally {
      flipBtn.disabled = !running;
    }
  }

  startBtn.addEventListener('click', function() { if (running) stop(); else start(); });
  flipBtn.addEventListener('click', flip);
  window.addEventListener('pagehide', function() { stop(); });
})();
</script>
</body>
</html>
