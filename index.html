<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#1a1a1a" />
<title>KineNeo - Pose Demo</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: #1a1a1a;
    color: #e8e8e8;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  .app {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 12px;
  }
  h1 {
    font-size: 18px;
    font-weight: 500;
    margin: 4px 0 12px 0;
    letter-spacing: 0.3px;
    color: #f0f0f0;
  }
  .stage {
    position: relative;
    width: 100%;
    max-width: 720px;
    flex: 1 1 auto;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  canvas {
    display: block;
    max-width: 100%;
    max-height: 70vh;
    width: auto;
    height: auto;
    background: #000;
    border-radius: 8px;
  }
  .fps {
    position: absolute;
    top: 8px;
    left: 8px;
    padding: 4px 8px;
    background: rgba(0, 0, 0, 0.55);
    color: #00FF88;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 12px;
    border-radius: 4px;
    pointer-events: none;
  }
  .controls {
    margin-top: 14px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }
  button {
    background: #2a2a2a;
    color: #f0f0f0;
    border: 1px solid #3a3a3a;
    border-radius: 6px;
    padding: 10px 18px;
    font-size: 14px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  button:hover:not(:disabled) { background: #333; }
  button:active:not(:disabled) { background: #3a3a3a; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  button.primary {
    background: #00FF88;
    color: #0a0a0a;
    border-color: #00FF88;
    font-weight: 600;
  }
  button.primary:hover:not(:disabled) { background: #1aff97; }
  .status {
    margin-top: 10px;
    min-height: 20px;
    font-size: 13px;
    text-align: center;
    max-width: 520px;
  }
  .status.error { color: #ff6b6b; }
  footer {
    margin-top: auto;
    padding-top: 16px;
    font-size: 11px;
    color: #888;
    text-align: center;
  }
  .placeholder {
    width: 100%;
    aspect-ratio: 4 / 3;
    max-height: 70vh;
    background: #0f0f0f;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #666;
    font-size: 13px;
  }
</style>
</head>
<body>
<div class="app">
  <h1>KineNeo - Pose Demo</h1>

  <div class="stage" id="stage">
    <div class="placeholder" id="placeholder">Tap "Start Camera" to begin</div>
    <canvas id="canvas" style="display:none;"></canvas>
    <div class="fps" id="fps" style="display:none;">0 FPS</div>
  </div>

  <div class="controls">
    <button id="startBtn" class="primary" type="button">Start Camera</button>
    <button id="flipBtn" type="button" disabled>Switch Camera</button>
  </div>

  <div class="status" id="status"></div>

  <footer>No data is recorded or saved. All processing happens on your device.</footer>
</div>

<video id="video" playsinline autoplay muted style="display:none;"></video>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/pose.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3.1675466124/drawing_utils.js" crossorigin="anonymous"></script>

<script>
(function () {
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const fpsEl = document.getElementById('fps');
  const startBtn = document.getElementById('startBtn');
  const flipBtn = document.getElementById('flipBtn');
  const statusEl = document.getElementById('status');
  const placeholder = document.getElementById('placeholder');

  let pose = null;
  let camera = null;
  let currentStream = null;
  let facingMode = 'environment';
  let running = false;

  let frameCount = 0;
  let lastFpsUpdate = performance.now();
  let fps = 0;

  function setStatus(msg, isError) {
    statusEl.textContent = msg || '';
    statusEl.classList.toggle('error', !!isError);
  }

  function ensureCanvasSize(w, h) {
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w;
      canvas.height = h;
    }
  }

  function onResults(results) {
    if (!results.image) return;

    const w = results.image.width;
    const h = results.image.height;
    ensureCanvasSize(w, h);

    ctx.save();
    ctx.clearRect(0, 0, w, h);
    ctx.drawImage(results.image, 0, 0, w, h);

    if (results.poseLandmarks) {
      if (window.drawConnectors && window.POSE_CONNECTIONS) {
        window.drawConnectors(ctx, results.poseLandmarks, window.POSE_CONNECTIONS, {
          color: '#00FF88',
          lineWidth: 2
        });
      }
      if (window.drawLandmarks) {
        window.drawLandmarks(ctx, results.poseLandmarks, {
          color: '#FFFFFF',
          fillColor: '#FFFFFF',
          lineWidth: 1,
          radius: 4
        });
      }
    }
    ctx.restore();

    frameCount++;
    const now = performance.now();
    const elapsed = now - lastFpsUpdate;
    if (elapsed >= 500) {
      fps = Math.round((frameCount * 1000) / elapsed);
      fpsEl.textContent = fps + ' FPS';
      frameCount = 0;
      lastFpsUpdate = now;
    }
  }

  async function stopCurrentStream() {
    if (camera) {
      try { camera.stop(); } catch (e) {}
      camera = null;
    }
    if (currentStream) {
      currentStream.getTracks().forEach(t => { try { t.stop(); } catch (e) {} });
      currentStream = null;
    }
    if (video.srcObject) {
      video.srcObject = null;
    }
  }

  async function startStream() {
    const constraints = {
      audio: false,
      video: {
        facingMode: { ideal: facingMode },
        width: { ideal: 640 },
        height: { ideal: 480 }
      }
    };

    let stream;
    try {
      stream = await navigator.mediaDevices.getUserMedia(constraints);
    } catch (err) {
      // Retry without facingMode constraint as a fallback
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          audio: false,
          video: { width: { ideal: 640 }, height: { ideal: 480 } }
        });
      } catch (err2) {
        throw err2;
      }
    }

    currentStream = stream;
    video.srcObject = stream;
    await new Promise((resolve) => {
      if (video.readyState >= 2) return resolve();
      video.onloadedmetadata = () => resolve();
    });
    try { await video.play(); } catch (e) {}
  }

  function initPose() {
    if (pose) return pose;
    pose = new window.Pose({
      locateFile: (file) =>
        'https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/' + file
    });
    pose.setOptions({
      modelComplexity: 1,
      smoothLandmarks: true,
      enableSegmentation: false,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });
    pose.onResults(onResults);
    return pose;
  }

  async function start() {
    if (running) return;
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      setStatus('Camera API is not available in this browser.', true);
      return;
    }
    if (!window.Pose) {
      setStatus('Failed to load MediaPipe Pose. Check your connection and reload.', true);
      return;
    }

    startBtn.disabled = true;
    setStatus('Requesting camera access...');

    try {
      await startStream();
      initPose();

      camera = new window.Camera(video, {
        onFrame: async () => {
          if (pose && video.readyState >= 2) {
            await pose.send({ image: video });
          }
        },
        width: video.videoWidth || 640,
        height: video.videoHeight || 480
      });
      camera.start();

      ensureCanvasSize(video.videoWidth || 640, video.videoHeight || 480);
      placeholder.style.display = 'none';
      canvas.style.display = 'block';
      fpsEl.style.display = 'block';
      flipBtn.disabled = false;
      startBtn.textContent = 'Stop';
      startBtn.disabled = false;
      running = true;
      setStatus('');
    } catch (err) {
      startBtn.disabled = false;
      const name = err && err.name ? err.name : '';
      if (name === 'NotAllowedError' || name === 'PermissionDeniedError') {
        setStatus('Camera permission was denied. Please allow camera access in your browser settings and try again.', true);
      } else if (name === 'NotFoundError' || name === 'DevicesNotFoundError') {
        setStatus('No camera was found on this device.', true);
      } else if (name === 'NotReadableError' || name === 'TrackStartError') {
        setStatus('The camera is already in use by another application.', true);
      } else if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
        setStatus('Camera access requires HTTPS. Please open this page over HTTPS.', true);
      } else {
        setStatus('Could not start camera: ' + (err && err.message ? err.message : 'unknown error'), true);
      }
    }
  }

  async function stop() {
    await stopCurrentStream();
    running = false;
    canvas.style.display = 'none';
    fpsEl.style.display = 'none';
    placeholder.style.display = 'flex';
    flipBtn.disabled = true;
    startBtn.textContent = 'Start Camera';
    startBtn.disabled = false;
    setStatus('');
  }

  async function flip() {
    if (!running) return;
    flipBtn.disabled = true;
    facingMode = (facingMode === 'environment') ? 'user' : 'environment';
    try {
      if (camera) { try { camera.stop(); } catch (e) {} camera = null; }
      if (currentStream) {
        currentStream.getTracks().forEach(t => { try { t.stop(); } catch (e) {} });
        currentStream = null;
      }
      await startStream();
      camera = new window.Camera(video, {
        onFrame: async () => {
          if (pose && video.readyState >= 2) {
            await pose.send({ image: video });
          }
        },
        width: video.videoWidth || 640,
        height: video.videoHeight || 480
      });
      camera.start();
      ensureCanvasSize(video.videoWidth || 640, video.videoHeight || 480);
    } catch (err) {
      setStatus('Could not switch camera: ' + (err && err.message ? err.message : 'unknown error'), true);
    } finally {
      flipBtn.disabled = !running;
    }
  }

  startBtn.addEventListener('click', () => {
    if (running) {
      stop();
    } else {
      start();
    }
  });
  flipBtn.addEventListener('click', flip);

  window.addEventListener('pagehide', () => { stopCurrentStream(); });
})();
</script>
</body>
</html>
